name: Selenium TestNG CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      suite:
        description: "Which test suite to run"
        required: true
        default: "ecommerce"
        type: choice
        options:
          - ecommerce
          - demoqa

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run ecommerce tests on push/PR, selected suite on manual run
        env:
          TEST_USER: ${{ secrets.TEST_USER }}
          TEST_PASS: ${{ secrets.TEST_PASS }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SUITE="${{ inputs.suite }}"
          else
            SUITE="ecommerce"
          fi

          echo "Running suite: $SUITE"

          if [ "$SUITE" = "demoqa" ]; then
            mvn clean test -Dtest="another.com.demoqa.tests.**"
          else
            mvn clean test -Dtest="another.com.ecommerce.tests.**"
          fi

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testng-reports
          path: |
            target/surefire-reports
            test-output
          if-no-files-found: ignore

      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots
          if-no-files-found: ignore